<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auction Explorer</title>

  <style>
    /* 🌈 Modern Auction UI Styles */

    :root {
      --primary: #007bff;
      --primary-dark: #005bb5;
      --accent: #ff2fa0;
      --bg-light: #f5f7fa;
      --text-dark: #2c3e50;
      --shadow: 0 6px 16px rgba(0,0,0,0.12);
      --shadow-hover: 0 10px 25px rgba(0,0,0,0.18);
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-light);
    }

    header {
      background: var(--primary);
      color: white;
      padding: 25px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
    }

    header ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }
    header ul li {
      display: inline-block;
      margin-left: 10px;
    }
    header ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    /* Main container */
    .container {
      max-width: 1150px;
      margin: auto;
      padding: 30px;
    }

    h2 {
      color: var(--text-dark);
      font-size: 2rem;
      text-align: center;
      margin-bottom: 25px;
    }

    /* Grid for auction items */
    .items {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
    }

    /* 🔥 Card Style */
    .item {
      width: 260px;
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: var(--shadow);
      transition: 0.3s ease;
      position: relative;
    }

    .item:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }

    /* Image placeholder */
    .item img,
    .image-box {
      width: 100%;
      height: 170px;
      border-radius: 10px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-weight: 600;
    }

    .item h3 {
      margin: 12px 0 6px;
      color: var(--text-dark);
      font-size: 1.25rem;
    }

    .item p {
      margin: 6px 0;
      color: #555;
    }

    /* Buttons */
    .item button {
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .bid-btn {
      background: var(--primary);
      color: white;
      margin-right: 5px;
      width: 48%;
    }

    .bid-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-3px);
    }

    .save-btn {
      background: var(--accent);
      color: white;
      width: 48%;
    }

    .save-btn:hover {
      background: #d11d84;
      transform: translateY(-3px);
    }

    /* Notification box */
    .notification {
      background: #eaf2ff;
      padding: 14px;
      border-left: 6px solid var(--primary);
      margin-top: 30px;
      border-radius: 6px;
      font-size: 1rem;
      text-align: center;
      color: var(--text-dark);
      box-shadow: var(--shadow);
    }
  </style>
</head>

<body>

  <header>
    <h1>Explore Electronics Item Auctions</h1>
    <p>Bid, browse, save favorites, and win amazing items!</p>

    <ul>
      <li><a href="home.html">Home</a></li>
    </ul>
  </header>

  <div class="container">
    <h2>Available Electronics Auction Items</h2>

    <!-- Dynamic items will be injected here -->
    <div class="items" id="items"></div>

    <div class="notification">
      🔔 You have 3 new bidding notifications. Check your dashboard to stay ahead!
    </div>
  </div>

</body>
</html>
